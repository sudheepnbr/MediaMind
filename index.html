<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaMind v4.7 | Cinema Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    
    <style>
        :root {
            --green: #2ecc71;
            --white: #FFFFFF;
            --dark-console: #1a1a1a;
            --cream-btn: #fdfcf8;
            --gold: #D4AF37;
            --blue-slider: #007bff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { background-color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        .master-console {
            width: 98vw; max-width: 1050px; height: auto; max-height: 98vh;
            background: var(--dark-console); border-radius: 35px; padding: 18px;
            border: 5px solid var(--green); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 10px;
        }

        /* --- STAGE AREA --- */
        .stage-area { width: 100%; aspect-ratio: 21 / 9; background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #333; transition: var(--transition); }
        .stage-area.collapsed { height: 0; opacity: 0; margin: 0; border-width: 0; transform: scaleY(0); }

        #visualizer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .video-js { position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 5; opacity: 0; visibility: hidden; }
        .video-active { opacity: 1 !important; visibility: visible !important; }

        /* --- THEATER/FULLSCREEN CONTROLS --- */
        .playback-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 20; display: flex; flex-direction: column; gap: 4px; }
        
        .overlay-bottom { display: flex; align-items: center; gap: 15px; }
        .time-display { display: flex; justify-content: space-between; color: white; font-size: 0.7rem; font-family: monospace; flex: 1; }
        
        .fs-toggle {
            background: none; border: none; color: var(--gold); cursor: pointer; padding: 5px;
            display: flex; align-items: center; transition: 0.2s;
        }
        .fs-toggle:hover { color: var(--green); transform: scale(1.1); }

        #seekbar { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255,255,255,0.2); outline: none; cursor: pointer; }
        #seekbar::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; }

        .preset-bar { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .preset-chip { background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 6px 16px; border-radius: 20px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
        .preset-chip.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        .controls-row { display: flex; justify-content: center; gap: 12px; padding: 5px 0; align-items: center; flex-wrap: wrap; }
        .neu-btn { width: 42px; height: 42px; background: var(--cream-btn); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; box-shadow: 0 8px 15px rgba(0,0,0,0.4); cursor: pointer; }
        .neu-btn.play-toggle { background: var(--green); width: 50px; height: 50px; }

        .vol-container { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; }
        #master-vol { -webkit-appearance: none; width: 70px; height: 3px; background: #444; }

        .dsp-panel { background: #fff; border-radius: 20px; padding: 15px 10px; display: flex; gap: 5px; justify-content: center; overflow-x: auto; box-shadow: inset 0 5px 10px rgba(0,0,0,0.2); }
        .eq-col { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; width: 62px; }
        .eq-slider { -webkit-appearance: slider-vertical; width: 4px; height: 75px; background: #ddd; cursor: pointer; }
        .eq-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--blue-slider); border-radius: 50%; border: 2px solid white; }
        .eq-label { font-size: 0.55rem; color: #444; font-weight: 800; }

        .brand-footer { background: var(--cream-btn); border-radius: 15px; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; height: 38px;}
    </style>
</head>
<body>

<div class="master-console" id="console">
    <div class="stage-area collapsed" id="stage">
        <canvas id="visualizer"></canvas>
        <video id="vjs_engine" class="video-js" crossorigin="anonymous" playsinline></video>
        
        <div class="playback-overlay">
            <input type="range" id="seekbar" min="0" max="100" value="0">
            <div class="overlay-bottom">
                <div class="time-display"><span id="cur-time">0:00</span><span id="dur-time">0:00</span></div>
                <button class="fs-toggle" onclick="toggleFullscreen()" title="Theater Mode">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="preset-bar" id="preset-list">
        <div class="preset-chip active" onclick="applyPreset('Flat')">Flat</div>
        <div class="preset-chip" onclick="applyPreset('Bass Boost')">Bass Boost</div>
        <div class="preset-chip" onclick="applyPreset('Acoustic')">Acoustic</div>
        <div class="preset-chip" onclick="applyPreset('Electronic')">Electronic</div>
        <div class="preset-chip" onclick="applyPreset('Clear Vocals')">Clear Vocals</div>
        <div class="preset-chip" onclick="applyPreset('Loudness')">Loudness</div>
    </div>

    <div class="controls-row">
        <button class="neu-btn" onclick="openMedia()"><svg width="18" height="18" fill="#333" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></button>
        <button class="neu-btn" onclick="playFromDrive()"><svg width="18" height="18" fill="#333" viewBox="0 0 24 24"><path d="M7.71 3.5L1.15 15l3.43 6l6.55-11.5M9.73 15L6.3 21h12.82l3.43-6M11.59 3.5L15 9.5l6.56 11.5l3.43-6L18.41 3.5"/></svg></button>
        <button class="neu-btn" onclick="prev()"><svg width="18" height="18" fill="#333" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="neu-btn play-toggle" onclick="toggle()"><svg id="pIcon" width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="neu-btn" onclick="next()"><svg width="18" height="18" fill="#333" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg></button>
        <div class="vol-container"><input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.8"></div>
        <button class="util-btn" style="background:var(--gold); border:none; padding:6px 12px; border-radius:5px; font-weight:bold; font-size:0.6rem;" onclick="saveCustomPreset()">SAVE AS...</button>
    </div>

    <div class="dsp-panel">
        <div class="eq-col"><input type="range" class="eq-slider" id="pre-amp" min="0" max="2" step="0.1" value="1"><span class="eq-label">PRE-AMP</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="32" min="-12" max="12" value="0"><span class="eq-label">32Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="64" min="-12" max="12" value="0"><span class="eq-label">64Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="250" min="-12" max="12" value="0"><span class="eq-label">250Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="1000" min="-12" max="12" value="0"><span class="eq-label">1kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="4000" min="-12" max="12" value="0"><span class="eq-label">4kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="16000" min="-12" max="12" value="0"><span class="eq-label">16kHz</span></div>
    </div>

    <div class="brand-footer">
        <b style="color:var(--gold); font-size:1rem;">MediaMind v4.7</b>
        <span style="font-size:0.5rem; color:#888; text-transform:uppercase; font-weight:bold;">POWERED BY INFRAMIND</span>
    </div>
</div>

<script>
    const player = videojs('vjs_engine', { controls: false, preload: 'auto' });
    const stage = document.getElementById('stage'), sk = document.getElementById('seekbar');
    const curT = document.getElementById('cur-time'), durT = document.getElementById('dur-time');
    let playlist = [], cur = 0, aCtx, anlyzr, masterGain, preAmpNode, filters = {};

    const presets = {
        'Flat': [0,0,0,0,0,0], 'Bass Boost': [8,7,2,0,2,4], 'Acoustic': [4,2,3,4,4,2],
        'Electronic': [6,4,1,3,5,7], 'Clear Vocals': [-3,0,4,4,0,-2], 'Loudness': [7,3,-2,2,6,8]
    };

    function formatTime(s) { let m = Math.floor(s / 60), sc = Math.floor(s % 60); return `${m}:${sc < 10 ? '0' : ''}${sc}`; }

    // --- FULLSCREEN LOGIC ---
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            stage.requestFullscreen().catch(err => {
                alert(`Error attempting to enable theater mode: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function applyPreset(name) {
        const values = presets[name];
        document.querySelectorAll('.band').forEach((s, i) => {
            s.value = values[i] || 0;
            if(filters[s.dataset.f]) filters[s.dataset.f].gain.value = values[i] || 0;
        });
        document.querySelectorAll('.preset-chip').forEach(c => c.classList.toggle('active', c.innerText === name));
    }

    function initDSP() {
        if (aCtx) return;
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = aCtx.createMediaElementSource(document.querySelector('video'));
        anlyzr = aCtx.createAnalyser(); anlyzr.fftSize = 256;
        preAmpNode = aCtx.createGain(); masterGain = aCtx.createGain();
        let lastNode = src;
        document.querySelectorAll('.band').forEach(slider => {
            const f = aCtx.createBiquadFilter(); f.type = "peaking"; f.frequency.value = slider.dataset.f;
            f.gain.value = slider.value; lastNode.connect(f); lastNode = f;
            filters[slider.dataset.f] = f;
            slider.oninput = (e) => { f.gain.value = e.target.value; };
        });
        lastNode.connect(preAmpNode); preAmpNode.connect(anlyzr); anlyzr.connect(masterGain);
        masterGain.connect(aCtx.destination);
        loop();
    }

    function loop() {
        requestAnimationFrame(loop); if(!anlyzr) return;
        const data = new Uint8Array(anlyzr.frequencyBinCount); anlyzr.getByteFrequencyData(data);
        const cvs = document.getElementById('visualizer');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        const ctx = cvs.getContext('2d'); ctx.clearRect(0,0,cvs.width,cvs.height);
        const bw = (cvs.width / data.length) * 2; let x = 0;
        for(let i=0; i<data.length; i++) {
            let bh = data[i] / 2; ctx.fillStyle = '#2ecc71';
            ctx.fillRect(x, cvs.height - bh, bw, bh); x += bw + 2;
        }
    }

    async function openMedia() {
        try {
            const h = await window.showDirectoryPicker(); playlist = [];
            for await (const e of h.values()) {
                if (e.kind === 'file') {
                    const f = await e.getFile();
                    if (f.type.startsWith('video/') || f.type.startsWith('audio/') || f.name.toLowerCase().endsWith('.mkv')) playlist.push(f);
                }
            }
            if(playlist.length > 0) play(0);
        } catch (e) {}
    }

    function play(i) {
        cur = i; const f = playlist[i];
        const isVideo = f.type.startsWith('video/') || f.name.toLowerCase().endsWith('.mkv');
        stage.classList.remove('collapsed');
        const vjsEl = document.querySelector('.video-js');
        if (isVideo) vjsEl.classList.add('video-active'); else vjsEl.classList.remove('video-active');
        player.src({ type: isVideo && f.name.toLowerCase().endsWith('.mkv') ? 'video/webm' : f.type, src: URL.createObjectURL(f) });
        player.load(); player.play().then(() => { if(!aCtx) initDSP(); });
        updateI(true);
    }

    function playFromDrive() {
        const id = prompt("Enter Drive Link or ID:"); if (!id) return;
        const match = id.match(/[-\w]{25,}/);
        const streamUrl = `https://docs.google.com/uc?export=download&id=${match ? match[0] : id}`;
        stage.classList.remove('collapsed'); document.querySelector('.video-js').classList.add('video-active');
        player.src({ type: 'video/mp4', src: streamUrl });
        player.play(); updateI(true); if(!aCtx) initDSP();
    }

    function toggle() { if (player.paused()) { player.play(); updateI(true); stage.classList.remove('collapsed'); } else { player.pause(); updateI(false); } }
    function updateI(s) { document.getElementById('pIcon').innerHTML = s ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>` : `<path d="M8 5v14l11-7z"/>`; }
    player.on('timeupdate', () => { sk.value = (player.currentTime() / player.duration()) * 100 || 0; curT.innerText = formatTime(player.currentTime()); durT.innerText = formatTime(player.duration() || 0); });
    sk.oninput = () => { player.currentTime((sk.value / 100) * player.duration()); };
    function next() { if(playlist.length) play((cur + 1) % playlist.length); }
    function prev() { if(playlist.length) play((cur - 1 + playlist.length) % playlist.length); }
    document.addEventListener('mousedown', () => { if(aCtx && aCtx.state === 'suspended') aCtx.resume(); });
</script>

</body>
</html>
