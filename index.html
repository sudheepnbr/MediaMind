<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaMind v4.1 | Auto-Save DSP</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    
    <style>
        :root {
            --green: #2ecc71;
            --white: #FFFFFF;
            --dark-console: #1a1a1a;
            --cream-btn: #fdfcf8;
            --gold: #D4AF37;
            --blue-slider: #007bff;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--white);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .master-console {
            width: 98vw;
            max-width: 1000px;
            height: auto; 
            max-height: 98vh;
            background: var(--dark-console);
            border-radius: 35px;
            padding: 20px;
            border: 5px solid var(--green);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: var(--transition);
        }

        .stage-area {
            width: 100%;
            aspect-ratio: 21 / 9;
            background: #000;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
            transition: var(--transition);
        }

        .stage-area.collapsed { height: 0; opacity: 0; margin: 0; border-width: 0; transform: scaleY(0); }

        #visualizer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .video-js { position: absolute !important; top: 0; left: 0; z-index: 2; opacity: 0; width: 100% !important; height: 100% !important;}
        .video-active { opacity: 1 !important; }

        .playback-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9));
            z-index: 15; display: flex; flex-direction: column; gap: 4px;
        }

        .time-display { display: flex; justify-content: space-between; color: white; font-size: 0.7rem; font-family: monospace; }
        #seekbar { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255,255,255,0.2); outline: none; cursor: pointer; }
        #seekbar::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--gold); border-radius: 50%; }

        .track-info {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.8); padding: 5px 10px;
            border-radius: 8px; border-left: 3px solid var(--green); z-index: 10;
        }
        .track-title { color: #fff; font-size: 0.75rem; margin: 0; }

        .controls-row { display: flex; justify-content: center; gap: 15px; padding: 5px 0; align-items: center; }
        .neu-btn { width: 45px; height: 45px; background: var(--cream-btn); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; box-shadow: 0 8px 15px rgba(0,0,0,0.4); cursor: pointer; }
        .neu-btn.play-toggle { background: var(--green); width: 55px; height: 55px; }

        .vol-container { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        #master-vol { -webkit-appearance: none; width: 80px; height: 4px; background: #444; border-radius: 2px; }
        #master-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--green); border-radius: 50%; }

        /* Save Button Styling */
        .save-btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.6rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        .dsp-panel { 
            background: #fff; 
            border-radius: 20px; 
            padding: 15px; 
            display: flex; 
            gap: 15px;
            overflow-x: auto;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2); 
        }

        .eq-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; width: 55px; }
        .eq-slider { -webkit-appearance: slider-vertical; width: 5px; height: 75px; background: #ddd; }
        .eq-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--blue-slider); border-radius: 50%; border: 2px solid white; }
        .eq-label { font-size: 0.55rem; color: #444; font-weight: 800; text-align: center; }

        .brand-footer { background: var(--cream-btn); border-radius: 15px; padding: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; height: 40px;}
    </style>
</head>
<body>

<div class="master-console" id="console">
    <div class="stage-area collapsed" id="stage">
        <canvas id="visualizer"></canvas>
        <video id="vjs_engine" class="video-js" playsinline></video>
        <div class="track-info"><h2 class="track-title" id="name-display">MediaMind v4.1 PRO</h2></div>
        <div class="playback-overlay">
            <input type="range" id="seekbar" min="0" max="100" value="0">
            <div class="time-display"><span id="cur-time">0:00</span><span id="dur-time">0:00</span></div>
        </div>
    </div>

    <div class="controls-row">
        <button class="neu-btn" onclick="openMedia()"><svg width="20" height="20" fill="#333" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg></button>
        <button class="neu-btn" onclick="prev()"><svg width="20" height="20" fill="#333" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="neu-btn play-toggle" onclick="toggle()">
            <svg id="pIcon" width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="neu-btn" onclick="next()"><svg width="20" height="20" fill="#333" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg></button>
        
        <div class="vol-container">
            <input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.8">
        </div>
        <button class="save-btn" onclick="savePresets()">Save EQ</button>
    </div>

    <div class="dsp-panel">
        <div class="eq-col"><input type="range" class="eq-slider" id="pre-amp" min="0" max="2" step="0.1" value="1"><span class="eq-label">PRE-AMP</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="32" min="-12" max="12" value="0"><span class="eq-label">32Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="64" min="-12" max="12" value="0"><span class="eq-label">64Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="125" min="-12" max="12" value="0"><span class="eq-label">125Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="250" min="-12" max="12" value="0"><span class="eq-label">250Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="500" min="-12" max="12" value="0"><span class="eq-label">500Hz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="1000" min="-12" max="12" value="0"><span class="eq-label">1kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="2000" min="-12" max="12" value="0"><span class="eq-label">2kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="4000" min="-12" max="12" value="0"><span class="eq-label">4kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="8000" min="-12" max="12" value="0"><span class="eq-label">8kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="12000" min="-12" max="12" value="0"><span class="eq-label">12kHz</span></div>
        <div class="eq-col"><input type="range" class="eq-slider band" data-f="16000" min="-12" max="12" value="0"><span class="eq-label">16kHz</span></div>
    </div>

    <div class="brand-footer">
        <b style="color:var(--gold); font-size:1rem;">MediaMind v4.1</b>
        <span style="font-size:0.5rem; color:#888; text-transform:uppercase; font-weight:bold;">POWERED BY INFRAMIND</span>
    </div>
</div>

<script>
    const player = videojs('vjs_engine', { controls: false });
    const stage = document.getElementById('stage'), sk = document.getElementById('seekbar');
    const curT = document.getElementById('cur-time'), durT = document.getElementById('dur-time');
    let playlist = [], cur = 0, aCtx, anlyzr, masterGain, preAmpNode, filterNodes = {};

    function formatTime(s) { let m = Math.floor(s / 60), sc = Math.floor(s % 60); return `${m}:${sc < 10 ? '0' : ''}${sc}`; }

    // --- NEW: PERSISTENCE LOGIC ---
    function savePresets() {
        const settings = {
            volume: document.getElementById('master-vol').value,
            preamp: document.getElementById('pre-amp').value,
            bands: {}
        };
        document.querySelectorAll('.band').forEach(s => {
            settings.bands[s.dataset.f] = s.value;
        });
        localStorage.setItem('mediamind_presets', JSON.stringify(settings));
        alert('Presets Saved Locally');
    }

    function loadSavedPresets() {
        const saved = localStorage.getItem('mediamind_presets');
        if (!saved) return;
        const settings = JSON.parse(saved);
        
        document.getElementById('master-vol').value = settings.volume;
        document.getElementById('pre-amp').value = settings.preamp;
        
        document.querySelectorAll('.band').forEach(s => {
            if(settings.bands[s.dataset.f]) s.value = settings.bands[s.dataset.f];
        });
    }

    // Call load on startup
    loadSavedPresets();

    function initDSP() {
        if (aCtx) return;
        aCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = aCtx.createMediaElementSource(document.querySelector('video'));
        anlyzr = aCtx.createAnalyser(); anlyzr.fftSize = 256;
        preAmpNode = aCtx.createGain();
        masterGain = aCtx.createGain();

        // Set initial gains from UI (which might have loaded saved data)
        masterGain.gain.value = document.getElementById('master-vol').value;
        preAmpNode.gain.value = document.getElementById('pre-amp').value;

        let lastNode = src;
        document.querySelectorAll('.band').forEach(slider => {
            const f = aCtx.createBiquadFilter(); 
            f.type = "peaking"; 
            f.frequency.value = slider.dataset.f;
            f.gain.value = slider.value; // Important: use the slider's current value
            lastNode.connect(f); 
            lastNode = f;
            slider.oninput = (e) => { f.gain.value = e.target.value; };
        });

        lastNode.connect(preAmpNode);
        preAmpNode.connect(anlyzr);
        anlyzr.connect(masterGain);
        masterGain.connect(aCtx.destination);
        
        document.getElementById('pre-amp').oninput = (e) => { preAmpNode.gain.value = e.target.value; };
        document.getElementById('master-vol').oninput = (e) => { masterGain.gain.value = e.target.value; };
        loop();
    }

    // --- REST OF THE PLAYER LOGIC ---
    function loop() {
        requestAnimationFrame(loop);
        const data = new Uint8Array(anlyzr.frequencyBinCount); anlyzr.getByteFrequencyData(data);
        const cvs = document.getElementById('visualizer');
        cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
        const ctx = cvs.getContext('2d'); ctx.clearRect(0,0,cvs.width,cvs.height);
        const bw = (cvs.width / data.length) * 2; let x = 0;
        for(let i=0; i<data.length; i++) {
            let bh = data[i] / 2; ctx.fillStyle = '#2ecc71';
            ctx.fillRect(x, cvs.height - bh, bw, bh); x += bw + 2;
        }
    }

    async function openMedia() {
        try {
            const h = await window.showDirectoryPicker(); playlist = [];
            for await (const e of h.values()) {
                if (e.kind === 'file') {
                    const f = await e.getFile();
                    if (f.type.startsWith('video/') || f.type.startsWith('audio/') || f.name.toLowerCase().endsWith('.mkv')) playlist.push(f);
                }
            }
            if(playlist.length > 0) play(0);
        } catch (e) {}
    }

    function play(i) {
        cur = i; const f = playlist[i]; const isV = f.type.startsWith('video/') || f.name.toLowerCase().endsWith('.mkv');
        stage.classList.remove('collapsed');
        document.getElementById('name-display').innerText = f.name;
        const vEl = document.getElementById('vjs_engine');
        if (isV) vEl.classList.add('video-active'); else vEl.classList.remove('video-active');
        player.src({ type: isV ? 'video/webm' : f.type, src: URL.createObjectURL(f) });
        player.play(); updateI(true); if(!aCtx) initDSP();
    }

    function toggle() {
        if (player.paused()) { player.play(); updateI(true); if(playlist.length > 0) stage.classList.remove('collapsed'); } 
        else { player.pause(); updateI(false); }
    }

    function updateI(s) { document.getElementById('pIcon').innerHTML = s ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>` : `<path d="M8 5v14l11-7z"/>`; }
    player.on('timeupdate', () => {
        sk.value = (player.currentTime() / player.duration()) * 100 || 0;
        curT.innerText = formatTime(player.currentTime());
        durT.innerText = formatTime(player.duration() || 0);
    });
    sk.oninput = () => { player.currentTime((sk.value / 100) * player.duration()); };
    function next() { play((cur + 1) % playlist.length); }
    function prev() { play((cur - 1 + playlist.length) % playlist.length); }
    player.on('ended', next);
    document.addEventListener('mousedown', () => { if(aCtx) aCtx.resume(); });
</script>

</body>
</html>
