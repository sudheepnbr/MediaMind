<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaMind v3.0 | Powered by InfraMind</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet">
    
    <style>
        :root {
            --green: #2ecc71;
            --dark-gray: #222222;
            --panel-bg: #333333;
            --cream: #f4f1e9;
            --bg-page: #e8e8e8;
            --gold: #D4AF37;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- THE NEUMORPHIC CONSOLE --- */
        .player-console {
            width: 95%;
            max-width: 1150px;
            background: var(--dark-gray);
            border-radius: 50px;
            padding: 30px;
            display: flex;
            gap: 25px;
            border: 10px solid var(--green);
            box-shadow: 25px 25px 70px rgba(0,0,0,0.4), inset 2px 2px 5px rgba(255,255,255,0.1);
            position: relative;
        }

        /* --- SIDEBAR: SYSTEM CONTROLS --- */
        .sys-side {
            display: flex;
            flex-direction: column;
            gap: 25px;
            justify-content: center;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding-right: 10px;
        }

        .icon-btn { color: #555; cursor: pointer; transition: var(--transition); }
        .icon-btn:hover { color: var(--green); filter: drop-shadow(0 0 5px var(--green)); }

        /* --- CENTER: DISPLAY & PLAYBACK --- */
        .player-core {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .display-stage {
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 30px;
            box-shadow: inset 8px 8px 15px rgba(0,0,0,0.6);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #444;
            position: relative;
        }

        .video-js { width: 100% !important; height: 100% !important; border-radius: 25px; }

        .overlay-info {
            position: absolute;
            bottom: 25px;
            left: 25px;
            background: rgba(0,0,0,0.8);
            padding: 12px 25px;
            border-radius: 18px;
            border-left: 5px solid var(--green);
            pointer-events: none;
            z-index: 10;
        }

        .song-title { color: #fff; font-size: 1.1rem; margin: 0; font-weight: 800; }
        .song-meta { color: var(--green); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CONTROLS: NEUMORPHIC BUTTONS --- */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .neu-btn {
            width: 65px; height: 65px;
            background: var(--cream);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            border: none;
            box-shadow: 6px 6px 15px rgba(0,0,0,0.3), -3px -3px 10px rgba(255,255,255,0.8);
            cursor: pointer;
            transition: var(--transition);
        }

        .neu-btn:active { box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2); transform: scale(0.95); }
        .neu-btn.play-toggle { background: var(--green); width: 80px; height: 80px; }

        /* --- DSP: EQUALIZER MODULE --- */
        .dsp-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            height: 130px;
            box-shadow: inset 5px 5px 15px #000;
        }

        .eq-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }

        .eq-slider {
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 80px;
            background: #111;
            outline: none;
            cursor: pointer;
        }

        .eq-label { font-size: 0.65rem; color: var(--gold); font-weight: 900; }

        /* --- BRANDING PANEL --- */
        .brand-side {
            width: 200px;
            background: var(--cream);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.4);
            text-align: center;
            padding: 20px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .player-console { flex-direction: column; padding: 20px; border-radius: 30px; }
            .sys-side { flex-direction: row; border: none; padding: 0 0 10px 0; }
            .brand-side { width: 100%; height: 80px; flex-direction: row; gap: 15px; }
            .display-stage { aspect-ratio: 4/3; }
        }
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-folder" viewBox="0 0 24 24"><path fill="currentColor" d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></symbol>
    <symbol id="icon-prev" viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></symbol>
    <symbol id="icon-play" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></symbol>
    <symbol id="icon-pause" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></symbol>
    <symbol id="icon-next" viewBox="0 0 24 24"><path fill="currentColor" d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></symbol>
</svg>

<div class="player-console">
    <div class="sys-side">
        <div class="icon-btn" onclick="openMediaFolder()"><svg width="40" height="40"><use href="#icon-folder"></use></svg></div>
    </div>

    <div class="player-core">
        <div class="display-stage" onclick="openMediaFolder()">
            <video id="vjs_engine" class="video-js" playsinline></video>
            <div class="overlay-info" id="info-box">
                <h2 class="song-title" id="track-name">MediaMind v3.0</h2>
                <p class="song-meta" id="track-status">Select High-Quality Media</p>
            </div>
        </div>

        <div class="controls-row">
            <button class="neu-btn" onclick="prevTrack()"><svg width="28" height="28"><use href="#icon-prev"></use></svg></button>
            <button class="neu-btn play-toggle" onclick="togglePlay()">
                <svg id="playIcon" width="35" height="35" style="fill:white;"><use href="#icon-play"></use></svg>
            </button>
            <button class="neu-btn" onclick="nextTrack()"><svg width="28" height="28"><use href="#icon-next"></use></svg></button>
        </div>

        <div class="dsp-panel">
            <div class="eq-col"><input type="range" class="eq-slider" id="gain-pre" min="0" max="2" step="0.1" value="1"><span class="eq-label">PRE</span></div>
            <div class="eq-col"><input type="range" class="eq-slider dsp-band" data-freq="60" min="-12" max="12" value="0"><span class="eq-label">BASS</span></div>
            <div class="eq-col"><input type="range" class="eq-slider dsp-band" data-freq="1000" min="-12" max="12" value="0"><span class="eq-label">MID</span></div>
            <div class="eq-col"><input type="range" class="eq-slider dsp-band" data-freq="3500" min="-12" max="12" value="0"><span class="eq-label">HIGH</span></div>
            <div class="eq-col"><input type="range" class="eq-slider dsp-band" data-freq="12000" min="-12" max="12" value="0"><span class="eq-label">TREB</span></div>
        </div>
    </div>

    <div class="brand-side">
        <div style="color:var(--gold); font-size:1.6rem; font-weight:900; letter-spacing:1px;">MediaMind</div>
        <p style="font-size:0.65rem; margin-top:10px; color:#555; text-transform:uppercase; letter-spacing:2px;">
            Powered by<br><b>InfraMind Technologies</b>
        </p>
    </div>
</div>

<script>
    // --- GLOBAL PLAYER INIT ---
    const player = videojs('vjs_engine', {
        fluid: true,
        controls: false, // We use our Neumorphic controls
        autoplay: false
    });

    let playlist = [], currentIndex = 0;
    let audioCtx, source, preAmp, filters = {};

    // --- WEB AUDIO DSP ENGINE ---
    function initDSPEngine() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const mediaEl = document.querySelector('video');
        source = audioCtx.createMediaElementSource(mediaEl);
        preAmp = audioCtx.createGain();
        let lastNode = source;

        document.querySelectorAll('.dsp-band').forEach(slider => {
            const freq = slider.dataset.freq;
            const filter = audioCtx.createBiquadFilter();
            filter.type = "peaking";
            filter.frequency.value = freq;
            filter.Q.value = 1.4;
            
            lastNode.connect(filter);
            lastNode = filter;
            filters[freq] = filter;

            slider.oninput = (e) => { filter.gain.value = e.target.value; };
        });

        lastNode.connect(preAmp);
        preAmp.connect(audioCtx.destination);
        document.getElementById('gain-pre').oninput = (e) => { preAmp.gain.value = e.target.value; };
    }

    // --- FILE SYSTEM ACCESS ---
    async function openMediaFolder() {
        try {
            const dirHandle = await window.showDirectoryPicker();
            playlist = [];
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const ext = file.name.split('.').pop().toLowerCase();
                    // All High Quality Formats
                    const validExts = ['mp4', 'mkv', 'webm', 'mov', 'mp3', 'wav', 'flac', 'ogg', 'm4a'];
                    
                    if (validExts.includes(ext) || file.type.startsWith('video/') || file.type.startsWith('audio/')) {
                        playlist.push(file);
                    }
                }
            }
            if(playlist.length > 0) playTrackAt(0);
        } catch (e) { console.warn("Directory access refused."); }
    }

    // --- PLAYBACK LOGIC ---
    function playTrackAt(index) {
        if (index < 0 || index >= playlist.length) return;
        currentIndex = index;
        const file = playlist[index];
        const fileName = file.name.toLowerCase();
        
        // Update UI
        document.getElementById('track-name').innerText = file.name;
        document.getElementById('track-status').innerText = fileName.endsWith('.mkv') ? "MKV Container Active" : "HQ Media Loaded";

        // BLOB HANDLING & MKV TYPE INJECTION
        const fileURL = URL.createObjectURL(file);
        let mimeType = file.type;

        // Force browser to attempt MKV playback via WebM engine if type is unknown
        if (fileName.endsWith('.mkv')) {
            mimeType = 'video/webm; codecs="vp8, vorbis"'; 
        }

        player.src({ type: mimeType, src: fileURL });
        player.ready(() => {
            player.play().catch(e => console.error("Playback failed:", e));
            updateIconState(true);
            if(!audioCtx) initDSPEngine();
        });
    }

    function togglePlay() {
        if (player.paused()) { player.play(); updateIconState(true); } 
        else { player.pause(); updateIconState(false); }
    }

    function updateIconState(isPlaying) {
        document.getElementById('playIcon').innerHTML = isPlaying ? `<use href="#icon-pause"></use>` : `<use href="#icon-play"></use>`;
    }

    function nextTrack() { playTrackAt((currentIndex + 1) % playlist.length); }
    function prevTrack() { playTrackAt((currentIndex - 1 + playlist.length) % playlist.length); }

    // Event Listeners
    player.on('ended', nextTrack);
    
    // Safety for Audio Context (Browser Policy)
    document.addEventListener('mousedown', () => { if(audioCtx) audioCtx.resume(); }, {once: false});
</script>

</body>
</html>
